<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocksbox — Карточка проекта</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4ecd8; --bg-deep:#ece1c6; --panel:#faf5e9; --panel-2:#f1e8d2;
    --line:#d8c8a4; --ink:#2e2719; --ink-dim:#7a6f57; --accent:#b8502e;
    --accent-soft:#e9d3c4; --ok:#5a7d3c; --field:#fffdf7; --radius:10px;
    --font:'Open Sans','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.5;padding:28px 16px 130px;max-width:920px;margin:0 auto;font-size:16px;}
  h1{font-size:27px;font-weight:700;margin-bottom:3px;}
  .sub{color:var(--ink-dim);font-size:14px;margin-bottom:24px;}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .section>h2{font-size:13px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:700;margin-bottom:14px;}
  .group-head{font-size:13px;font-weight:700;color:var(--ink);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px dashed var(--line);}
  .group-head:first-of-type{margin-top:0;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:620px){.grid{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1/-1;}
  label.lbl{font-size:13px;color:var(--ink-dim);font-weight:500;}
  .note{font-size:11px;color:var(--ink-dim);font-style:italic;}
  input[type=text],select,textarea{background:var(--field);border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:9px 11px;font-size:15px;font-family:var(--font);width:100%;}
  textarea{resize:vertical;min-height:48px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  select.empty-list{color:var(--ink-dim);font-style:italic;}
  /* toggle */
  .toggle{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:7px;overflow:hidden;width:max-content;}
  .toggle button{border:none;background:var(--field);color:var(--ink-dim);font-size:14px;padding:8px 16px;cursor:pointer;font-family:var(--font);}
  .toggle button.on{background:var(--accent);color:#fff;font-weight:600;}
  /* chips */
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .chip{font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:var(--field);color:var(--ink-dim);cursor:pointer;user-select:none;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  /* module */
  .module{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .module-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .module-head .tag{font-size:13px;font-weight:700;color:#fff;background:var(--accent);padding:3px 12px;border-radius:20px;}
  /* images */
  .imgrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .imgcard{position:relative;width:96px;}
  .imgcard img{width:96px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--line);}
  .imgcard .rm{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;border-radius:50%;width:18px;height:18px;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .upload-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 13px;border:1.5px dashed var(--line);border-radius:7px;color:var(--accent);cursor:pointer;background:var(--field);width:max-content;}
  button{font-family:var(--font);cursor:pointer;border:none;border-radius:7px;font-weight:600;font-size:15px;padding:10px 16px;}
  button:hover{filter:brightness(1.05);}
  .btn-add{background:transparent;color:var(--accent);border:1.5px dashed var(--line);width:100%;padding:12px;font-size:14px;}
  .btn-add:hover{background:var(--panel-2);}
  .btn-del{background:transparent;color:var(--ink-dim);font-size:20px;padding:0 8px;}
  .btn-del:hover{color:var(--accent);}
  .bar{position:fixed;bottom:0;left:0;right:0;background:rgba(244,236,216,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);}
  .out{background:#2e2719;color:#f0e6cf;border-radius:8px;font-family:Consolas,monospace;font-size:12px;padding:14px;margin-top:12px;white-space:pre-wrap;word-break:break-word;display:none;max-height:300px;overflow-y:auto;}
  .out.show{display:block;}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:9px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;}
  .toast.show{opacity:1;}
  .stage-banner{background:var(--accent-soft);border:1px solid var(--accent);color:#7a2e15;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;}
</style>
</head>
<body>
  <h1>Карточка проекта Rocksbox</h1>
  <div class="sub">Источник правды для ТЗ и договора. Заполняешь один раз — документы собираются отсюда.</div>
  <div class="stage-banner">⚙️ <b>Стадия: болванка структуры.</b> Выпадающие списки пока пустые («варианты позже») — сейчас смотрим только на разделы, поля и их типы. Наполним вариантами следующим шагом.</div>

  <div id="form-root"></div>

  <div class="bar">
    <button class="btn-ghost" onclick="downloadProject()">💾 Сохранить проект</button>
    <label class="btn-ghost" style="display:inline-flex;align-items:center;cursor:pointer">📂 Открыть<input type="file" accept=".json" style="display:none" onchange="loadProject(this)"></label>
    <button class="btn-primary" onclick="exportData()">Собрать для Claude</button>
  </div>
  <div class="out" id="output"></div>
  <div class="toast" id="toast">Готово</div>

<script>
/* ===========================================================================
   СХЕМА ФОРМЫ — зеркало таблицы form-schema.csv (Раздел/Группа/Поле/Тип/Источник)
   Тип: text | select | multi | toggle | file
   source: 'список: имя'  → тянет из LISTS (пока пусто)
           'a; b; c'       → готовые варианты (структурный выбор)
   =========================================================================== */
  const SECTIONS = [
    { name:'Проект', fields:[
      {label:'Адрес объекта', type:'text'},
      {label:'Название проекта', type:'text'},
      {label:'Расположение', type:'select', source:'В помещении; На улице; Смешанное'},
      {label:'Номер договора', type:'text'},
      {label:'Контактное лицо заказчика', type:'text'},
      {label:'Рисунки проекта', type:'file'},
    ]},
    { name:'Конструкции здания', fields:[
      {group:'Полы', label:'Основа', type:'select', source:'список: основа'},
      {group:'Полы', label:'Толщина основы', type:'text', note:'мм'},
      {group:'Полы', label:'Отделка', type:'select', source:'список: отделка'},
      {group:'Полы', label:'Толщина отделки', type:'text', note:'мм'},
      {group:'Стены', label:'Основа', type:'select', source:'список: основа'},
      {group:'Стены', label:'Толщина основы', type:'text', note:'мм'},
      {group:'Стены', label:'Отделка', type:'select', source:'список: отделка'},
      {group:'Стены', label:'Толщина отделки', type:'text', note:'мм'},
      {group:'Колонны', label:'Основа', type:'select', source:'список: основа'},
      {group:'Колонны', label:'Толщина основы', type:'text', note:'мм'},
      {group:'Колонны', label:'Отделка', type:'select', source:'список: отделка'},
      {group:'Колонны', label:'Толщина отделки', type:'text', note:'мм'},
      {group:'Потолок', label:'Основа', type:'select', source:'список: основа'},
      {group:'Потолок', label:'Отделка', type:'select', source:'список: отделка'},
      {label:'Коммуникации открытые', type:'text'},
      {label:'Коммуникации скрытые', type:'text'},
    ]},
    { name:'Модули / участки', repeating:true, item:'Модуль', fields:[
      {label:'Название', type:'text'},
      {label:'Тип модуля', type:'select', source:'Обычный модуль; Типовой элемент'},
      {label:'Типовой элемент', type:'select', source:'список: типовой_элемент'},
      {label:'Высота', type:'text', note:'м'},
      {label:'Протяжённость / ширина', type:'text', note:'м'},
      {label:'Вылаз наверх', type:'toggle'},
      {label:'Геометрия плоскостей', type:'multi', source:'список: геометрия', full:true},
      {label:'Тип панели', type:'select', source:'список: панель'},
      {label:'Тип мата', type:'select', source:'список: мат'},
      {group:'Крепление каркаса', label:'к полу', type:'select', source:'список: крепёж'},
      {group:'Крепление каркаса', label:'к стенам', type:'select', source:'список: крепёж'},
      {group:'Крепление каркаса', label:'к колоннам', type:'select', source:'список: крепёж'},
      {group:'Крепление каркаса', label:'к потолку', type:'select', source:'список: крепёж'},
      {group:'Крепление каркаса', label:'Уточнение', type:'text', full:true},
      {group:'Крепление матов', label:'Способ', type:'select', source:'список: крепёж'},
      {label:'Каркас', type:'select', source:'список: каркас'},
      {label:'Толщина фанеры', type:'text', note:'мм'},
      {label:'Покрытие фанеры', type:'select', source:'список: покрытие'},
      {label:'Верхняя кромка', type:'text'},
      {label:'Особые требования', type:'text', long:true, full:true},
      {label:'Рисунки модуля', type:'file', full:true},
    ]},
    { name:'Панели скалодрома', fields:[
      {label:'Материал', type:'text', note:'обычно фанера'},
      {label:'Толщина фанеры', type:'text', note:'мм'},
      {label:'Покрытие', type:'select', source:'список: покрытие'},
      {label:'Сетка отверстий', type:'select', source:'список: сетка'},
      {label:'Тип спитов', type:'text'},
      {label:'Люки доступа', type:'toggle'},
      {label:'Фанерная юбка', type:'text', full:true},
    ]},
    { name:'Маты', fields:[
      {label:'Общая высота', type:'text', note:'мм'},
      {label:'Покрытие (ткань)', type:'select', source:'список: мат_ткань'},
      {label:'Наполнитель (слои)', type:'text', long:true, full:true},
      {label:'Примыкания', type:'text', long:true, full:true},
    ]},
    { name:'Организация работ', fields:[
      {group:'Наряд-допуски', label:'Работы на высоте', type:'toggle'},
      {group:'Наряд-допуски', label:'Огневые работы', type:'toggle'},
      {group:'Наряд-допуски', label:'Сварка на объекте', type:'toggle', note:'если да → огневые обязательны'},
      {group:'Инструктаж', label:'Периодичность', type:'select', source:'единоразово перед началом; иное'},
      {group:'Разгрузка', label:'Способ разгрузки', type:'multi', source:'список: способ_разгрузки', full:true},
      {group:'Разгрузка', label:'Путь разгрузки', type:'select', source:'список: путь_разгрузки'},
      {group:'Разгрузка', label:'Этаж монтажа', type:'text'},
      {group:'Разгрузка', label:'Размеры лифта (ДШВ, масса)', type:'text'},
      {group:'Площадка', label:'Электричество', type:'text', note:'220В, мощность, отдельная линия 16А', full:true},
      {group:'Площадка', label:'Освещение', type:'text', note:'лк'},
      {group:'Площадка', label:'Демонтаж в местах примыкания', type:'toggle'},
      {group:'Мусор и уборка', label:'Вывоз мусора', type:'select', source:'Подрядчик; Заказчик'},
      {group:'Мусор и уборка', label:'Уборка', type:'select', source:'Подрядчик; Заказчик'},
      {group:'Шум', label:'Работы до 100 дБ', type:'text', note:'время'},
      {group:'Шум', label:'Работы свыше 100 дБ', type:'text', note:'время'},
      {group:'Доступ', label:'Часы доступа', type:'text', note:'напр. 8:00–22:00'},
      {group:'Смежные работы', label:'Возможность параллельно', type:'select', source:'да; с ограничениями; нет'},
      {group:'Смежные работы', label:'Описание', type:'text', long:true, full:true},
      {group:'Допуск', label:'Тип объекта', type:'select', source:'список: тип_объекта'},
      {group:'Допуск', label:'Схема договора', type:'select', source:'один (ИП поставка+монтаж); раздельно (ООО поставка + ИП монтаж)', full:true},
      {group:'Допуск', label:'Электрика в нашем объёме', type:'toggle'},
      {group:'Допуск', label:'Крепление к несущим', type:'toggle', note:'если да — узлы с нагрузками, согласование с собственником'},
      {group:'Допуск', label:'Страхование на период работ', type:'select', source:'мы; заказчик; не предусмотрено'},
      {group:'Допуск', label:'Сертификат оформлен на', type:'select', source:'ООО; ИП'},
      {group:'Допуск', label:'Класс горючести / КМ запрошен', type:'toggle'},
    ]},
    { name:'Итоги', fields:[
      {label:'Общая площадь поверхности', type:'text', note:'м²'},
      {label:'Итоговая сумма', type:'text'},
      {label:'Режим НДС', type:'select', source:'без НДС; 5% (ИП); 20%'},
      {label:'Срок действия цен', type:'text', note:'дней'},
      {label:'Курс евро для матов', type:'text'},
    ]},
    { name:'Этапы (календарный план)', repeating:true, item:'Этап', fields:[
      {label:'Описание этапа', type:'text', full:true},
      {label:'Дата начала', type:'text'},
      {label:'Дата конца', type:'text'},
      {label:'Сумма / процент по окончании', type:'text'},
      {label:'Условие наступления', type:'text', note:'напр. после согласования проекта', full:true},
    ]},
    { name:'Гарантия (по элементам)', fields:[
      {label:'Каркас', type:'text', note:'срок'},
      {label:'Панели', type:'text', note:'срок'},
      {label:'Маты', type:'text', note:'срок'},
      {label:'Покрытие', type:'text', note:'срок'},
      {label:'Тренажёры', type:'text', note:'срок'},
    ]},
    { name:'Реквизиты для договора', fields:[
      {label:'Заказчик (наименование/ФИО)', type:'text', full:true},
      {label:'Тип заказчика', type:'select', source:'юрлицо; физлицо; ИП'},
      {label:'ИНН / КПП', type:'text'},
      {label:'ОГРН / ОГРНИП', type:'text'},
      {label:'Расчётный счёт', type:'text'},
      {label:'Банк', type:'text'},
      {label:'БИК', type:'text'},
      {label:'Корр. счёт', type:'text'},
      {label:'Юридический адрес', type:'text', full:true},
      {label:'Паспортные данные', type:'text', note:'для физлиц', full:true},
      {label:'Подписант (ФИО, должность, основание)', type:'text', full:true},
    ]},
  ];

  // Растущие словари — ПОКА ПУСТЫЕ (наполним следующим шагом из таблицы)
  const LISTS = {
    'основа':[], 'отделка':[], 'крепёж':[], 'покрытие':[], 'каркас':[],
    'сетка':[], 'геометрия':[], 'панель':[], 'мат':[], 'мат_ткань':[],
    'типовой_элемент':[], 'способ_разгрузки':[], 'путь_разгрузки':[], 'тип_объекта':[]
  };

  /* ---- рендеринг ---- */
  let imgStore = {};   // imgKey -> [{name,data}]
  let imgSeq = 0;

  function optsFromSource(src){
    if(!src) return {list:null, opts:[]};
    const m = src.match(/^список:\s*(.+)$/);
    if(m){ const name=m[1].trim(); return {list:name, opts:(LISTS[name]||[]).slice()}; }
    return {list:null, opts:src.split(';').map(s=>s.trim()).filter(Boolean)};
  }

  function fieldHTML(f){
    const full = f.full ? ' full' : '';
    const note = f.note ? `<span class="note">${f.note}</span>` : '';
    let control = '';
    if(f.type==='text'){
      control = f.long ? `<textarea data-key></textarea>` : `<input type="text" data-key>`;
    } else if(f.type==='select'){
      const {list,opts} = optsFromSource(f.source);
      if(opts.length){
        control = `<select data-key><option value=""></option>${opts.map(o=>`<option>${o}</option>`).join('')}</select>`;
      } else {
        control = `<select data-key class="empty-list"><option value="">— варианты позже${list?` (список «${list}»)`:''} —</option></select>`;
      }
    } else if(f.type==='multi'){
      const {list,opts} = optsFromSource(f.source);
      if(opts.length){
        control = `<div class="chips" data-key>${opts.map(o=>`<span class="chip" onclick="this.classList.toggle('on')">${o}</span>`).join('')}</div>`;
      } else {
        control = `<div class="chips" data-key><span class="note">— варианты позже${list?` (список «${list}»)`:''} —</span></div>`;
      }
    } else if(f.type==='toggle'){
      control = `<div class="toggle" data-key data-val="">
        <button type="button" onclick="setToggle(this,'Да')">Да</button>
        <button type="button" onclick="setToggle(this,'Нет')">Нет</button></div>`;
    } else if(f.type==='file'){
      const k = 'img'+(imgSeq++); imgStore[k]=[];
      control = `<div class="imgrow" data-imgrow="${k}"></div>
        <label class="upload-btn">＋ Загрузить<input type="file" accept="image/*" multiple style="display:none" onchange="addImages(this,'${k}')"></label>`;
      return `<div class="field full" data-type="file" data-label="${f.label}" data-imgkey="${k}"><label class="lbl">${f.label} ${note}</label>${control}</div>`;
    }
    return `<div class="field${full}" data-type="${f.type}" data-label="${f.label}"${f.group?` data-group="${f.group}"`:''}>
      <label class="lbl">${f.label} ${note}</label>${control}</div>`;
  }

  function fieldsGridHTML(fields){
    let html=''; let curGroup=undefined; let gridOpen=false;
    const openGrid=()=>{ html+='<div class="grid">'; gridOpen=true; };
    const closeGrid=()=>{ if(gridOpen){ html+='</div>'; gridOpen=false; } };
    fields.forEach(f=>{
      const g=f.group||null;
      if(g!==curGroup){
        closeGrid();
        if(g!==null) html+=`<div class="group-head">${g}</div>`;
        openGrid();
        curGroup=g;
      }
      html+=fieldHTML(f);
    });
    closeGrid();
    return html;
  }

  function renderSection(sec, idx){
    const div=document.createElement('div');
    div.className='section'; div.dataset.section=sec.name;
    if(sec.repeating){
      div.innerHTML=`<h2>${sec.name}</h2><div class="rep-list" data-rep="${idx}"></div>
        <button class="btn-add" onclick="addRepItem(${idx})">+ Добавить ${sec.item.toLowerCase()}</button>`;
      document.getElementById('form-root').appendChild(div);
      addRepItem(idx); // одна штука сразу
    } else {
      div.innerHTML=`<h2>${sec.name}</h2>${fieldsGridHTML(sec.fields)}`;
      document.getElementById('form-root').appendChild(div);
    }
  }

  const repCounters={};
  function addRepItem(idx){
    const sec=SECTIONS[idx];
    const list=document.querySelector(`[data-rep="${idx}"]`);
    repCounters[idx]=(repCounters[idx]||0)+1;
    const n=list.children.length+1;
    const item=document.createElement('div');
    item.className='module'; item.dataset.repitem='1';
    item.innerHTML=`<div class="module-head"><span class="tag">${sec.item} ${n}</span>
      <button class="btn-del" onclick="this.closest('[data-repitem]').remove();renumberRep(${idx})">×</button></div>
      ${fieldsGridHTML(sec.fields)}`;
    list.appendChild(item);
  }
  function renumberRep(idx){
    const sec=SECTIONS[idx];
    document.querySelectorAll(`[data-rep="${idx}"] .tag`).forEach((t,i)=>t.textContent=`${sec.item} ${i+1}`);
  }

  function setToggle(btn,val){
    const wrap=btn.closest('.toggle');
    wrap.dataset.val = wrap.dataset.val===val ? '' : val;
    [...wrap.querySelectorAll('button')].forEach(b=>b.classList.toggle('on', b.textContent===wrap.dataset.val));
  }

  /* ---- картинки ---- */
  function addImages(input,key){
    [...input.files].forEach(file=>{
      const r=new FileReader();
      r.onload=e=>{ imgStore[key].push({name:file.name,data:e.target.result}); renderImgs(key); };
      r.readAsDataURL(file);
    });
    input.value='';
  }
  function renderImgs(key){
    const el=document.querySelector(`[data-imgrow="${key}"]`); if(!el) return;
    el.innerHTML=(imgStore[key]||[]).map((im,i)=>`<div class="imgcard"><span class="rm" onclick="rmImg('${key}',${i})">×</span><img src="${im.data}"></div>`).join('');
  }
  function rmImg(key,i){ imgStore[key].splice(i,1); renderImgs(key); }

  /* ---- сбор данных ---- */
  function readField(el){
    const t=el.dataset.type;
    if(t==='text'){ const c=el.querySelector('[data-key]'); return c?c.value.trim():''; }
    if(t==='select'){ const c=el.querySelector('[data-key]'); return c?c.value:''; }
    if(t==='multi'){ return [...el.querySelectorAll('.chip.on')].map(c=>c.textContent); }
    if(t==='toggle'){ return el.querySelector('.toggle').dataset.val||''; }
    if(t==='file'){ const k=el.dataset.imgkey; return (imgStore[k]||[]).map(im=>im.name); }
    return '';
  }
  function fieldKey(el){ const g=el.dataset.group; return g?`${g} — ${el.dataset.label}`:el.dataset.label; }

  function collectFieldsContainer(container){
    const obj={};
    container.querySelectorAll('.field').forEach(el=>{ obj[fieldKey(el)]=readField(el); });
    return obj;
  }

  function buildData(){
    const data={};
    document.querySelectorAll('#form-root > .section').forEach((sec,idx)=>{
      const s=SECTIONS[idx];
      if(s.repeating){
        data[s.name]=[...sec.querySelectorAll('[data-repitem]')].map(item=>collectFieldsContainer(item));
      } else {
        data[s.name]=collectFieldsContainer(sec);
      }
    });
    return data;
  }

  function exportData(){
    const out=document.getElementById('output');
    out.textContent=JSON.stringify(buildData(),null,2);
    out.classList.add('show'); out.scrollIntoView({behavior:'smooth',block:'nearest'});
    if(navigator.clipboard) navigator.clipboard.writeText(out.textContent).then(()=>toast('Скопировано')).catch(()=>{});
  }
  function downloadProject(){
    const full={ data:buildData(), _images:imgStore };
    const name=(buildData()['Проект']||{})['Название проекта']||'проект';
    const blob=new Blob([JSON.stringify(full)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name+'_карточка.json'; a.click();
    toast('Проект сохранён');
  }
  function loadProject(input){
    const file=input.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=e=>{ try{ applyData(JSON.parse(e.target.result)); toast('Проект загружен'); }catch(err){ toast('Ошибка чтения'); } };
    r.readAsText(file); input.value='';
  }
  function applyData(full){
    // болванка: базовое восстановление текстов/выборов/тумблеров (без повторов и картинок — добьём позже)
    const d=full.data||full;
    document.querySelectorAll('#form-root > .section').forEach((sec,idx)=>{
      const s=SECTIONS[idx]; if(s.repeating) return;
      const vals=d[s.name]||{};
      sec.querySelectorAll('.field').forEach(el=>{
        const k=fieldKey(el), t=el.dataset.type, v=vals[k];
        if(v===undefined) return;
        if(t==='text'||t==='select'){ const c=el.querySelector('[data-key]'); if(c) c.value=v; }
        else if(t==='toggle' && v){ const w=el.querySelector('.toggle'); w.dataset.val=v; [...w.querySelectorAll('button')].forEach(b=>b.classList.toggle('on',b.textContent===v)); }
      });
    });
  }

  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }

  SECTIONS.forEach(renderSection);
</script>
</body>
</html>
